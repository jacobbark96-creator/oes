<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Open Energy Solutions | UK Premium Solar Installer</title>
    <meta name="title" content="Open Energy Solutions | UK Premium Solar Installer" />
    <meta name="description" content="Open Energy Solutions provides state-of-the-art solar systems, battery storage, and EV charging designed to slash your bills and carbon footprint across the UK." />
    <meta name="keywords" content="solar installation, UK solar installer, solar panels, EV chargers, solar finance, PPA solar, battery storage, clean energy" />
    <meta name="author" content="Open Energy Solutions" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://openlead.co.uk" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://openlead.co.uk/" />
    <meta property="og:title" content="Open Energy Solutions | UK Premium Solar Installer" />
    <meta property="og:description" content="Open Energy Solutions provides state-of-the-art solar systems, battery storage, and EV charging designed to slash your bills and carbon footprint across the UK." />
    <meta property="og:image" content="/OEMLogo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://openlead.co.uk/" />
    <meta property="twitter:title" content="Open Energy Solutions | UK Premium Solar Installer" />
    <meta property="twitter:description" content="Open Energy Solutions provides state-of-the-art solar systems, battery storage, and EV charging designed to slash your bills and carbon footprint across the UK." />
    <meta property="twitter:image" content="/OEMLogo.png" />

    <!-- Preload / Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
